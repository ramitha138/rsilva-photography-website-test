name: Website Tests

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Website URL to test"
        required: false
        default: "https://www.rsilvafoto.com"

jobs:
  playwright:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BASE_URL: ${{ github.event.inputs.base_url || 'https://www.rsilvafoto.com' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
